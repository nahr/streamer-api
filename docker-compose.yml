services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    volumes:
      - ./docker/mediamtx.yml:/mediamtx.yml
      - table-tv-data:/recordings
    command: ["/mediamtx.yml"]
    # Table TV API syncs paths via Control API; FFmpeg reads streams from RTSP
    ports:
      - "18554:8554" # RTSP (optional, for external access)
      - "19997:9997" # Control API (internal)
      - "19996:9996" # Playback (recordings download)

  table-tv:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: table-tv
    environment:
      - USE_STUNNEL_FOR_RTMPS=${USE_STUNNEL_FOR_RTMPS:-}
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_PLAYBACK_URL=http://mediamtx:9996
      - MEDIAMTX_RTSP_HOST=mediamtx
      - MEDIAMTX_RTSP_PORT=8554
    ports:
      - "80:80"
    hostname: table-tv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - table-tv-data:/app/data
      - ./.env:/app/.env

volumes:
  table-tv-data:
