name: Build and Publish Debian Package

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Node.js for npm build
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install
        working-directory: ./ui

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --deb-revision ${{ github.run_number }}
        working-directory: ./api

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: api/target/debian/*.deb

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-amd64

      - name: Download arm64 .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-arm64

      - name: Publish Debian repo to gh-pages
        run: |
          # Create proper root layout
          mkdir -p dists/stable/main/binary-amd64
          mkdir -p dists/stable/main/binary-arm64
          mkdir -p pool/main/y

          # Copy .deb files to pool
          cp deb-amd64/*.deb pool/main/y/
          cp deb-arm64/*.deb pool/main/y/

          # Generate Packages.gz per architecture
          dpkg-scanpackages -a amd64 pool /dev/null | gzip -9c > dists/stable/main/binary-amd64/Packages.gz
          dpkg-scanpackages -a arm64 pool /dev/null | gzip -9c > dists/stable/main/binary-arm64/Packages.gz

          # Disable Jekyll
          touch .nojekyll

          # Configure git
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          # Switch to orphan gh-pages branch
          git checkout --orphan gh-pages

          # Remove any old files from branch
          git rm -rf . || true

          # Add new repo files
          git add .
          git commit -m "Publish Debian repo"
          git push -f origin gh-pages
