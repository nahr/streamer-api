name: Build and Publish Debian Package

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Node.js for npm build
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Optional: install dependencies
      - name: Install npm dependencies
        run: npm install
        working-directory: ./ui

      # Install cargo-deb
      - name: Install cargo-deb
        run: cargo install cargo-deb

      # Build the Rust project, runs build.rs automatically
      - name: Build .deb package
        run: cargo deb
        working-directory: ./api

      # Deploy .deb to GitHub Pages
      - name: Publish Debian repo to gh-pages
        run: |
            mkdir -p repo/dists/stable/main/binary-amd64
            mkdir -p repo/pool/main/y
            cp api/target/debian/*.deb repo/pool/main/y/
            dpkg-scanpackages repo/pool /dev/null | gzip -9c > repo/dists/stable/main/binary-amd64/Packages.gz
            git config --global user.name "${{ github.actor }}"
            git config --global user.email "${{ github.actor }}@users.noreply.github.com"
            git checkout --orphan gh-pages
            git add repo
            git commit -m "Publish Debian repo"
            git push -f origin gh-pages


      - name: Verify package
        run: ls -l target/debian/